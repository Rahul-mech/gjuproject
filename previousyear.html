<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Previous Year Questions - Classmate</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: linear-gradient(135deg, #f0f4f8, #d9e6f2);
      color: #1a2e44;
      line-height: 1.6;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 90%;
      max-width: 700px;
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
      border-left: 5px solid #2c5282;
    }
    h1 {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      color: #2c5282;
      margin-bottom: 25px;
      text-transform: uppercase;
    }
    .step {
      display: none;
    }
    .step.active {
      display: block;
    }
    .progress {
      text-align: center;
      font-size: 14px;
      color: #718096;
      margin-bottom: 20px;
      font-weight: 500;
    }
    label {
      display: block;
      font-size: 16px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 10px;
    }
    select {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      border: 2px solid #e2e8f0;
      border-radius: 6px;
      margin-bottom: 20px;
      background: #edf2f7;
      color: #1a2e44;
      cursor: pointer;
      transition: border-color 0.3s ease;
    }
    select:focus {
      outline: none;
      border-color: #2c5282;
    }
    .buttons {
      display: flex;
      gap: 15px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    button {
      padding: 10px 25px;
      font-size: 15px;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    #backBtn {
      background: #a0aec0;
      display: none;
    }
    #backBtn:hover {
      background: #718096;
    }
    #nextBtn {
      background: #2c5282;
    }
    #nextBtn:hover {
      background: #2b6cb0;
    }
    #showDriveBtn {
      background: #38a169;
      display: none;
    }
    #showDriveBtn:hover {
      background: #2f855a;
    }
    #drive-content {
      margin-top: 20px;
      display: none;
    }
    #drive-content iframe {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 6px;
    }
    #drive-content p {
      font-size: 16px;
      color: #1a2e44;
      margin-top: 10px;
    }
    #drive-content a {
      color: #2c5282;
      text-decoration: none;
    }
    #drive-content a:hover {
      text-decoration: underline;
    }
    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }
      h1 {
        font-size: 22px;
      }
      select {
        padding: 10px;
        font-size: 14px;
      }
      button {
        padding: 8px 20px;
        font-size: 14px;
      }
      .buttons {
        flex-direction: column;
        gap: 10px;
      }
      #drive-content iframe {
        height: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Previous Year Papers</h1>
    <div class="progress">Step 1 of 2</div>

    <!-- Step 1: University Selection -->
    <div class="step active" id="step1">
      <label for="university">Select University:</label>
      <select id="university" onchange="validateStep(1)">
        <option value="" disabled selected>Select University</option>
        <option value="gju">Guru Jambheshwar University (GJU)</option>
      </select>
    </div>

    <!-- Step 2: Branch Selection -->
    <div class="step" id="step2">
      <div class="progress">Step 2 of 2</div>
      <label for="branch">Select Department:</label>
      <select id="branch" onchange="validateStep(2)">
        <option value="" disabled selected>Select Department</option>
      </select>
    </div>

    <!-- Drive Content -->
    <div id="drive-content">
      <iframe src="https://drive.google.com/embeddedfolderview?id=1caoTXIdxQvZceWOdNymEA2SziWaGJKG3#list" title="Google Drive Folder"></iframe>
      <p>If the content above doesn't load, <a href="https://drive.google.com/drive/folders/1caoTXIdxQvZceWOdNymEA2SziWaGJKG3?usp=sharing" target="_blank">click here</a> to view the papers directly on Google Drive.</p>
    </div>

    <div class="buttons">
      <button id="backBtn" onclick="goBack()">Back</button>
      <button id="nextBtn" onclick="nextStep()">Next</button>
      <button id="showDriveBtn" onclick="showDriveContent()">Show Papers</button>
    </div>
  </div>

  <script>
    const universities = {
      gju: [
        "Mechanical Engineering",
        "Computer Science",
        "Civil Engineering",
        "Artificial Intelligence and Machine Learning",
        "Electronics and Communications"
      ]
    };

    let currentStep = 1;

    function validateStep(step) {
      const university = document.getElementById('university').value;
      const branch = document.getElementById('branch').value;

      if (step === 1 && university) return true;
      if (step === 2 && branch) return true;
      return false;
    }

    function nextStep() {
      if (currentStep === 1) {
        if (validateStep(1)) {
          updateBranches();
          showStep(2);
        } else {
          alert("Please select a university!");
        }
      }
    }

    function goBack() {
      if (currentStep > 1) {
        showStep(currentStep - 1);
        if (currentStep === 2) document.getElementById('backBtn').style.display = 'none';
        document.getElementById('drive-content').style.display = 'none';
      }
    }

    function showStep(step) {
      const steps = document.getElementsByClassName('step');
      for (let i = 0; i < steps.length; i++) {
        steps[i].classList.remove('active');
      }
      document.getElementById(`step${step}`).classList.add('active');
      currentStep = step;
      updateProgress();

      if (step === 1) {
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'inline-block';
        document.getElementById('showDriveBtn').style.display = 'none';
      } else if (step === 2) {
        document.getElementById('backBtn').style.display = 'inline-block';
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('showDriveBtn').style.display = 'inline-block';
      }
    }

    function updateBranches() {
      const university = document.getElementById('university').value;
      const branchSelect = document.getElementById('branch');
      branchSelect.innerHTML = '<option value="" disabled selected>Select Department</option>';
      if (university) {
        universities[university].forEach(branch => {
          const option = document.createElement('option');
          option.value = branch;
          option.textContent = branch;
          branchSelect.appendChild(option);
        });
      }
    }

    function showDriveContent() {
      const branch = document.getElementById('branch').value;
      const driveContent = document.getElementById('drive-content');

      if (branch === "Mechanical Engineering") {
        driveContent.style.display = 'block';
      } else {
        driveContent.style.display = 'none';
        alert("Papers are currently available only for Mechanical Engineering.");
      }
    }

    function updateProgress() {
      document.querySelectorAll('.progress').forEach(p => {
        p.textContent = `Step ${currentStep} of 2`;
      });
    }
  </script>
</body>
</html>
